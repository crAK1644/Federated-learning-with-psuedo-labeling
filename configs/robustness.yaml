# Multi-seed robustness profile: same settings as paper.yaml, run once per seed in
# {2023, 2024, 2025} by run_suite.py, which reports mean +/- std across the three runs.
# Kept as run_kind=extension so these never get mistaken for the single-seed canonical
# paper-comparison numbers even though the settings are otherwise identical.
profile: robustness
run_kind: extension
algorithm: ssfl
backbone: cnn
scenario: 1
seed: 2023 # overridden per-seed by run_suite.py: 2023, 2024, 2025

data_path: artifacts/data
output_path: artifacts/runs

num_server_rounds: 200
local_epochs: 5
batch_size: 80
paper_text_batch: false
learning_rate: 1.0e-4
device: cuda
deterministic: true

ssfl_threshold_policy: median
ssfl_discriminator_mode: enabled
ssfl_voting_mode: enabled
ssfl_label_representation: hard
ssfl_soft_label_round_decimals: null

dsfl_temperature: 0.1

checkpoint_interval: 1
checkpoint_rounds: [10, 50, 100, 150, 200]
logging_interval: 1

client_num_cpus: 1.0
client_num_gpus: 0.125
max_concurrent_clients: 8
