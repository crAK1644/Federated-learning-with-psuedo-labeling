# Identical to paper.yaml except it reproduces the Section V-C prose's batch size of 100 instead
# of Table I's structural batch size of 80. See REPRODUCIBILITY.md assumption #1.
profile: paper_batch100
run_kind: paper
algorithm: ssfl
backbone: cnn
scenario: 1
seed: 2023

data_path: artifacts/data
output_path: artifacts/runs

num_server_rounds: 200
local_epochs: 5
batch_size: 80
paper_text_batch: true # -> effective_batch_size == 100
learning_rate: 1.0e-4
device: cuda
deterministic: true

ssfl_threshold_policy: median
ssfl_discriminator_mode: enabled
ssfl_voting_mode: enabled
ssfl_label_representation: hard
ssfl_soft_label_round_decimals: null

dsfl_temperature: 0.1

checkpoint_interval: 1
checkpoint_rounds: [10, 50, 100, 150, 200]
logging_interval: 1

client_num_cpus: 1.0
client_num_gpus: 0.125
max_concurrent_clients: 8
