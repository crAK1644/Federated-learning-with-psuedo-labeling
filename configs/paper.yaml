# Canonical paper-reproduction profile. Full 200-round, full-client-participation runs.
# Requires artifacts/data prepared from the real N-BaIoT dataset (see prepare_data.py).
profile: paper
run_kind: paper
algorithm: ssfl
backbone: cnn
scenario: 1
seed: 2023

data_path: artifacts/data
output_path: artifacts/runs

num_server_rounds: 200
local_epochs: 5
batch_size: 80
paper_text_batch: false
learning_rate: 1.0e-4
device: auto
deterministic: true

ssfl_threshold_policy: median
ssfl_discriminator_mode: enabled
ssfl_voting_mode: enabled
ssfl_label_representation: hard
ssfl_soft_label_round_decimals: null

dsfl_temperature: 0.1

checkpoint_interval: 10
checkpoint_rounds: [10, 50, 100, 150, 200]
logging_interval: 1

client_num_cpus: 1.0
client_num_gpus: 0.0
max_concurrent_clients: 8
