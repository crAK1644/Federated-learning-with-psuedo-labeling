# CPU smoke-verification profile: this build's acceptance gate (see M11 in
# SSFL_IMPLEMENTATION_PLAN.md). Two rounds, few local epochs, small batch, CPU-forced determinism.
#
# Client count note: Scenario 1/2/3 client counts (27/89/89) are structural — they fall out of the
# "N shards per device -> 2 shards per client" partitioning rule, not a configurable knob. "Reduced
# client count" for smoke is therefore achieved by pointing data_path at a tiny synthetic 9-device
# dataset (see tests/integration/conftest.py generator) rather than by shrinking scenario 1's client
# count below 27. Running smoke against the real artifacts/data (from the full N-BaIoT dataset) also
# works and is what `run_suite`/CI use for the end-to-end acceptance check; it is just slower.
profile: smoke
run_kind: extension
algorithm: ssfl
backbone: cnn
scenario: 1
seed: 2023

data_path: artifacts/data
output_path: artifacts/runs

num_server_rounds: 2
local_epochs: 1
batch_size: 16
paper_text_batch: false
learning_rate: 1.0e-4
device: cpu
deterministic: true

ssfl_threshold_policy: median
ssfl_discriminator_mode: enabled
ssfl_voting_mode: enabled
ssfl_label_representation: hard
ssfl_soft_label_round_decimals: null

dsfl_temperature: 0.1

checkpoint_interval: 1
checkpoint_rounds: [1, 2]
logging_interval: 1
log_every_batch: false

client_num_cpus: 1.0
client_num_gpus: 0.0
max_concurrent_clients: 8
